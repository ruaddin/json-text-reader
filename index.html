<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON / Text Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0078d4;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px;
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }

    textarea {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "Courier New", monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #0078d4; }
    #output { background: #f8f8f8; color: #222; min-height: 200px; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-group label { margin: 0; white-space: nowrap; }

    input[type=range] { width: 160px; accent-color: #0078d4; cursor: pointer; }

    select {
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    #val-wrap, #val-font { font-size: 0.82rem; color: #555; min-width: 28px; text-align: center; }

    button {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #005fa3; }

    #status {
      font-size: 0.82rem;
      color: #888;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>JSON / Text Reader</h1>

  <div class="card">
    <div>
      <label for="input">Input (JSON or plain text)</label>
      <textarea id="input" rows="10" placeholder="Paste your JSON or plain text here..."></textarea>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <label for="wrap-slider">Wrap width:</label>
        <input type="range" id="wrap-slider" min="20" max="200" step="10" value="80" />
        <span id="val-wrap">80</span>
      </div>

      <div class="ctrl-group">
        <label for="font-slider">Font size:</label>
        <input type="range" id="font-slider" min="8" max="32" step="1" value="13" />
        <span id="val-font">13</span>
      </div>

      <div class="ctrl-group">
        <label for="lang-select">Translate to:</label>
        <select id="lang-select">
          <option value="">No translation</option>
          <option value="en">English</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="th">Thai</option>
          <option value="vi">Vietnamese</option>
          <option value="tl">Tagalog</option>
        </select>
      </div>

      <button id="read-btn">Read JSON</button>
    </div>

    <span id="status"></span>

    <div>
      <label for="output">Output</label>
      <textarea id="output" rows="16" readonly></textarea>
    </div>
  </div>

  <script>
    const inputEl   = document.getElementById('input');
    const outputEl  = document.getElementById('output');
    const wrapSlider = document.getElementById('wrap-slider');
    const fontSlider = document.getElementById('font-slider');
    const valWrap   = document.getElementById('val-wrap');
    const valFont   = document.getElementById('val-font');
    const langSel   = document.getElementById('lang-select');
    const readBtn   = document.getElementById('read-btn');
    const statusEl  = document.getElementById('status');

    // Live slider labels
    wrapSlider.addEventListener('input', () => valWrap.textContent = wrapSlider.value);
    fontSlider.addEventListener('input', () => {
      const sz = fontSlider.value + 'px';
      valFont.textContent = fontSlider.value;
      inputEl.style.fontSize = sz;
      outputEl.style.fontSize = sz;
    });

    // --- Format logic (mirrors Python) ---
    function wrapText(text, width, indent) {
      if (width <= 0) return text;
      const subsequent = indent + '  ';
      const lines = text.split('\n');
      const result = [];
      for (const line of lines) {
        if (line.length === 0) { result.push(''); continue; }
        const words = line.split(' ');
        let current = '';
        let first = true;
        for (const word of words) {
          const prefix = first ? indent : subsequent;
          if (!current) {
            current = prefix + word;
          } else if ((current + ' ' + word).length <= width) {
            current += ' ' + word;
          } else {
            result.push(current);
            current = subsequent + word;
            first = false;
          }
        }
        if (current) result.push(current);
        first = false;
      }
      return result.join('\n');
    }

    function formatValue(value, indent, wrapWidth) {
      const pad = '  '.repeat(indent);
      if (value === null)   return 'null';
      if (typeof value === 'boolean') return String(value);
      if (typeof value === 'number')  return String(value);
      if (typeof value === 'string') {
        let text = value
          .replace(/\\n/g, '\n')
          .replace(/\\t/g, '\t')
          .replace(/\\r/g, '');
        return wrapText(text, wrapWidth, pad);
      }
      if (Array.isArray(value)) {
        const lines = [];
        for (const item of value) {
          if (typeof item === 'object' && item !== null) {
            lines.push(formatValue(item, indent, wrapWidth));
            lines.push('');
          } else {
            lines.push(`${pad}- ${formatValue(item, indent, wrapWidth)}`);
          }
        }
        return lines.join('\n').replace(/\n+$/, '');
      }
      if (typeof value === 'object') {
        const lines = [];
        for (const [k, v] of Object.entries(value)) {
          if (typeof v === 'object' && v !== null) {
            lines.push(`${pad}${k}:`);
            lines.push(formatValue(v, indent + 1, wrapWidth));
          } else {
            lines.push(`${pad}${k}: ${formatValue(v, indent, wrapWidth)}`);
          }
        }
        return lines.join('\n');
      }
      return String(value);
    }

    // --- Translation via MyMemory (free, no key) ---
    async function translateChunk(chunk, targetLang) {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=auto|${targetLang}`;
      const res = await fetch(url);
      const json = await res.json();
      const out = json.responseData?.translatedText ?? chunk;
      // MyMemory echoes "QUERY LENGTH LIMIT EXCEEDED" as the translation on failure
      return out.includes('QUERY LENGTH LIMIT EXCEEDED') ? chunk : out;
    }

    async function translateText(text, targetLang) {
      if (!targetLang || !text.trim()) return text;
      const LIMIT = 480; // stay safely under the 500-char API limit
      if (text.length <= LIMIT) {
        try { return await translateChunk(text, targetLang); } catch { return text; }
      }
      // Split on sentence boundaries where possible, otherwise hard-split
      const sentences = text.match(/[^.!?\n]+[.!?\n]*/g) ?? [text];
      const chunks = [];
      let current = '';
      for (const sentence of sentences) {
        if (current.length + sentence.length > LIMIT) {
          if (current) chunks.push(current);
          // If a single sentence exceeds the limit, hard-split it
          if (sentence.length > LIMIT) {
            for (let i = 0; i < sentence.length; i += LIMIT)
              chunks.push(sentence.slice(i, i + LIMIT));
            current = '';
          } else {
            current = sentence;
          }
        } else {
          current += sentence;
        }
      }
      if (current) chunks.push(current);
      try {
        const translated = await Promise.all(chunks.map(c => translateChunk(c, targetLang)));
        return translated.join('');
      } catch {
        return text;
      }
    }

    async function translateFormatted(value, wrapWidth, targetLang) {
      // Translate leaf strings, then format
      async function translateValue(v) {
        if (typeof v === 'string') return await translateText(v, targetLang);
        if (Array.isArray(v))     return await Promise.all(v.map(translateValue));
        if (typeof v === 'object' && v !== null) {
          const out = {};
          for (const [k, val] of Object.entries(v)) out[k] = await translateValue(val);
          return out;
        }
        return v;
      }
      const translated = targetLang ? await translateValue(value) : value;
      return formatValue(translated, 0, wrapWidth);
    }

    // --- Button handler ---
    readBtn.addEventListener('click', async () => {
      const raw = inputEl.value.trim();
      if (!raw) { outputEl.value = 'Please paste a JSON string or plain text first.'; return; }

      const wrapWidth = parseInt(wrapSlider.value, 10);
      const targetLang = langSel.value;

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        data = raw; // treat as plain string
      }

      readBtn.disabled = true;
      statusEl.textContent = targetLang ? 'Translating...' : 'Formatting...';

      try {
        const formatted = await translateFormatted(data, wrapWidth, targetLang);
        const sepStart = '='.repeat(40) + ' START ' + '='.repeat(40);
        const sepEnd   = '='.repeat(41) + ' END '   + '='.repeat(41);
        outputEl.value = `${sepStart}\n${formatted}\n${sepEnd}`;
        statusEl.textContent = '';
      } catch (e) {
        outputEl.value = `Error: ${e.message}`;
        statusEl.textContent = '';
      } finally {
        readBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
