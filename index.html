<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON / Text Reader</title>
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 24px 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0078d4;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }

    textarea {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "Courier New", monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #0078d4; }
    #output { background: #f8f8f8; color: #222; min-height: 200px; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-group label { margin: 0; white-space: nowrap; }

    input[type=range] { width: 160px; accent-color: #0078d4; cursor: pointer; }

    select {
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    #val-wrap, #val-font { font-size: 0.82rem; color: #555; min-width: 28px; text-align: center; }

    button {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #005fa3; }
    button:disabled { background: #90b8d4; cursor: default; }

    #status {
      font-size: 0.82rem;
      color: #888;
      min-height: 1.2em;
    }

    /* ── History button ── */
    #history-btn {
      margin-left: auto;
      background: #fff;
      color: #0078d4;
      border: 1.5px solid #0078d4;
      padding: 6px 14px;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #history-btn:hover { background: #e8f2fb; }
    #history-badge {
      background: #0078d4;
      color: #fff;
      border-radius: 10px;
      font-size: 0.72rem;
      padding: 1px 6px;
      font-weight: 700;
      display: none;
    }
    #history-badge.visible { display: inline-block; }

    /* ── Drawer overlay ── */
    #drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
    }
    #drawer-overlay.open { display: block; }

    /* ── Drawer ── */
    #history-drawer {
      position: fixed;
      top: 0;
      right: -280px;
      width: 260px;
      height: 100vh;
      background: #f0f2f5;
      border-left: 0.5px solid #c8c8c8;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transition: right 0.25s ease;
      box-shadow: -4px 0 16px rgba(0,0,0,0.08);
    }
    #history-drawer.open { right: 0; }

    #drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px 12px;
      border-bottom: 1px solid #d0d0d0;
      flex-shrink: 0;
    }
    #drawer-header span:first-child { font-weight: 600; font-size: 0.95rem; }
    #drawer-entry-count { font-size: 0.78rem; color: #888; }

    #history-search {
      margin: 10px 10px 6px;
      padding: 6px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      width: calc(100% - 20px);
      flex-shrink: 0;
    }
    #history-search:focus { border-color: #0078d4; }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .history-entry {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #e8e8e8;
      transition: background 0.15s;
    }
    .history-entry:hover { background: #e4eef7; }
    .history-entry.active { background: #dceefb; }

    .entry-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }
    .entry-input-preview {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .entry-time {
      font-size: 0.72rem;
      color: #999;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-output-preview {
      font-size: 0.75rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #drawer-empty {
      text-align: center;
      color: #aaa;
      font-size: 0.85rem;
      padding: 32px 16px;
    }

    /* ── Table toggle ── */
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #table-btn {
      display: none;
      background: #fff;
      color: #0078d4;
      border: 1.5px solid #0078d4;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
    }
    #table-btn:hover { background: #e8f2fb; }
    #table-btn.active { background: #0078d4; color: #fff; }
  </style>
</head>
<body>
  <h1>JSON / Text Reader</h1>

  <div class="card">
    <div>
      <label for="input">Input (JSON or plain text)</label>
      <textarea id="input" rows="14" placeholder="Paste your JSON or plain text here..."></textarea>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <label for="wrap-slider">Wrap width:</label>
        <input type="range" id="wrap-slider" min="20" max="200" step="10" value="80" />
        <span id="val-wrap">80</span>
      </div>

      <div class="ctrl-group">
        <label for="font-slider">Font size:</label>
        <input type="range" id="font-slider" min="8" max="32" step="1" value="13" />
        <span id="val-font">13</span>
      </div>

      <div class="ctrl-group">
        <label for="lang-select">Translate to:</label>
        <select id="lang-select">
          <option value="">No translation</option>
          <option value="en">English</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="th">Thai</option>
          <option value="vi">Vietnamese</option>
          <option value="tl">Tagalog</option>
        </select>
      </div>

      <button id="history-btn">
        History <span id="history-badge"></span>
      </button>
    </div>

    <span id="status"></span>

    <div>
      <div class="output-header">
        <label for="output">Output</label>
        <button id="table-btn">Table View</button>
      </div>
      <textarea id="output" rows="22" readonly></textarea>
    </div>
  </div>

  <!-- Drawer overlay (click-outside-to-close) -->
  <div id="drawer-overlay"></div>

  <!-- History drawer -->
  <div id="history-drawer">
    <div id="drawer-header">
      <span>History</span>
      <span id="drawer-entry-count">0 entries</span>
    </div>
    <input id="history-search" type="text" placeholder="Search inputs..." autocomplete="off" />
    <div id="history-list">
      <div id="drawer-empty">No history yet.</div>
    </div>
  </div>

  <script>
    /* ── Sliders ── */
    document.getElementById('wrap-slider').addEventListener('input', function () {
      document.getElementById('val-wrap').textContent = this.value;
      triggerRead();
    });
    document.getElementById('font-slider').addEventListener('input', function () {
      document.getElementById('val-font').textContent = this.value;
      const sz = this.value + 'px';
      document.getElementById('input').style.fontSize = sz;
      document.getElementById('output').style.fontSize = sz;
    });
    document.getElementById('lang-select').addEventListener('change', triggerRead);

    /* ── Debounced auto-read ── */
    let _debounceTimer = null;
    function triggerRead() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(() => {
        if (window._pyReadReady) window._pyReadReady();
      }, 400);
    }
    document.getElementById('input').addEventListener('input', triggerRead);

    /* ── History ── */
    const STORAGE_KEY = 'json_reader_history';
    const MAX_ENTRIES = 10;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function relativeTime(isoStr) {
      const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
      if (diff < 60)   return 'now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      return Math.floor(diff / 86400) + 'd';
    }

    function renderHistory(filter) {
      const history = loadHistory();
      const list    = document.getElementById('history-list');
      const empty   = document.getElementById('drawer-empty');
      const badge   = document.getElementById('history-badge');
      const count   = document.getElementById('drawer-entry-count');

      const filtered = filter
        ? history.filter(e => e.input.toLowerCase().includes(filter.toLowerCase()))
        : history;

      badge.textContent = history.length;
      badge.classList.toggle('visible', history.length > 0);
      count.textContent = history.length === 1 ? '1 entry' : `${history.length} entries`;

      // Remove old entries (keep the empty placeholder)
      list.querySelectorAll('.history-entry').forEach(el => el.remove());

      if (filtered.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      filtered.forEach((entry, idx) => {
        const el = document.createElement('div');
        el.className = 'history-entry' + (idx === 0 ? ' active' : '');
        el.innerHTML = `
          <div class="entry-top">
            <span class="entry-input-preview">${escHtml(entry.input)}</span>
            <span class="entry-time">${relativeTime(entry.timestamp)}</span>
          </div>
          <div class="entry-output-preview">${escHtml(entry.output)}</div>
        `;
        el.addEventListener('click', () => restoreEntry(entry));
        list.appendChild(el);
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    window.addToHistory = function(input, output, wrapWidth, fontSize, lang) {
      let history = loadHistory();
      // Skip duplicate of most recent entry
      if (history.length > 0 && history[0].input === input) {
        history[0].output    = output;
        history[0].timestamp = new Date().toISOString();
        history[0].settings  = { wrapWidth, fontSize, lang };
      } else {
        history.unshift({
          input, output,
          timestamp: new Date().toISOString(),
          settings: { wrapWidth, fontSize, lang }
        });
        if (history.length > MAX_ENTRIES) history.pop();
      }
      saveHistory(history);
      renderHistory(document.getElementById('history-search').value);
    };

    function restoreEntry(entry) {
      // Restore input
      document.getElementById('input').value = entry.input;
      // Restore output
      document.getElementById('output').value = entry.output;
      // Restore settings
      const ws = document.getElementById('wrap-slider');
      ws.value = entry.settings.wrapWidth;
      document.getElementById('val-wrap').textContent = entry.settings.wrapWidth;

      const fs = document.getElementById('font-slider');
      fs.value = entry.settings.fontSize;
      document.getElementById('val-font').textContent = entry.settings.fontSize;
      const sz = entry.settings.fontSize + 'px';
      document.getElementById('input').style.fontSize  = sz;
      document.getElementById('output').style.fontSize = sz;

      document.getElementById('lang-select').value = entry.settings.lang;

      closeDrawer();
    }

    /* ── Drawer open/close ── */
    function openDrawer()  {
      document.getElementById('history-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('history-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
    function toggleDrawer() {
      document.getElementById('history-drawer').classList.contains('open')
        ? closeDrawer() : openDrawer();
    }

    document.getElementById('history-btn').addEventListener('click', toggleDrawer);
    document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
    document.getElementById('history-search').addEventListener('input', function () {
      renderHistory(this.value);
    });

    // Initial render (loads badge count from localStorage)
    renderHistory('');

    /* ── Table toggle ── */
    let _normalOutput = '';
    let _tableOutput  = null;
    let _showingTable = false;

    window.setOutputs = function(normalText, tableText) {
      _normalOutput = normalText;
      _tableOutput  = tableText;
      _showingTable = false;
      document.getElementById('output').value = normalText;
      const btn = document.getElementById('table-btn');
      if (tableText != null) {
        btn.style.display = 'inline-block';
        btn.textContent = 'Table View';
        btn.classList.remove('active');
      } else {
        btn.style.display = 'none';
      }
    };

    document.getElementById('table-btn').addEventListener('click', function () {
      const out = document.getElementById('output');
      if (_showingTable) {
        out.value = _normalOutput;
        this.textContent = 'Table View';
        this.classList.remove('active');
        _showingTable = false;
      } else {
        out.value = _tableOutput;
        this.textContent = 'Normal View';
        this.classList.add('active');
        _showingTable = true;
      }
    });
  </script>

  <!-- Python runs in the browser via Pyodide (PyScript) -->
  <script type="py">
import json
import re
import textwrap
import urllib.parse
import js
from pyscript import document, when

GT_LIMIT = 4800  # safe chunk size for Google Translate unofficial endpoint

# ── Translation ──────────────────────────────────────────────────────────────

async def _translate_chunk(chunk, target_lang):
    encoded = urllib.parse.quote(chunk)
    url = (
        "https://translate.googleapis.com/translate_a/single"
        f"?client=gtx&sl=auto&tl={target_lang}&dt=t&q={encoded}"
    )
    response = await js.fetch(url)
    text = await response.text()
    data = json.loads(text)
    return "".join(part[0] for part in data[0])

async def translate_text(text, target_lang):
    if not target_lang or not text.strip():
        return text
    try:
        if len(text) <= GT_LIMIT:
            return await _translate_chunk(text, target_lang)
        sentences = re.findall(r'[^.!?\n]+[.!?\n]*', text) or [text]
        chunks, current = [], ''
        for s in sentences:
            if len(current) + len(s) > GT_LIMIT:
                if current:
                    chunks.append(current)
                if len(s) > GT_LIMIT:
                    for i in range(0, len(s), GT_LIMIT):
                        chunks.append(s[i:i + GT_LIMIT])
                    current = ''
                else:
                    current = s
            else:
                current += s
        if current:
            chunks.append(current)
        parts = []
        for c in chunks:
            parts.append(await _translate_chunk(c, target_lang))
        return ''.join(parts)
    except Exception:
        return text

async def translate_value(value, target_lang):
    if isinstance(value, str):
        return await translate_text(value, target_lang)
    if isinstance(value, list):
        return [await translate_value(item, target_lang) for item in value]
    if isinstance(value, dict):
        return {k: await translate_value(v, target_lang) for k, v in value.items()}
    return value

# ── Formatting ────────────────────────────────────────────────────────────────

def format_value(value, indent=0, wrap_width=80):
    pad = "  " * indent
    if isinstance(value, dict):
        lines = []
        for k, v in value.items():
            if isinstance(v, (dict, list)):
                lines.append(f"{pad}{k}:")
                lines.append(format_value(v, indent + 1, wrap_width))
            else:
                lines.append(f"{pad}{k}: {format_value(v, indent, wrap_width)}")
        return "\n".join(lines)
    if isinstance(value, list):
        lines = []
        for item in value:
            if isinstance(item, (dict, list)):
                lines.append(format_value(item, indent, wrap_width))
                lines.append("")
            else:
                lines.append(f"{pad}- {format_value(item, indent, wrap_width)}")
        return "\n".join(lines).rstrip()
    if isinstance(value, str):
        text = value.replace("\\n", "\n").replace("\\t", "\t").replace("\\r", "")
        if wrap_width > 0:
            wrapped = []
            for line in text.splitlines():
                wrapped.extend(
                    textwrap.wrap(line, width=wrap_width, subsequent_indent=pad + "  ") or [""]
                )
            return "\n".join(wrapped)
        return text
    return str(value)

# ── Table detection & generation ─────────────────────────────────────────────

def is_table_data(data):
    """True if data is a non-empty list of dicts that all share the same keys."""
    if not isinstance(data, list) or len(data) == 0:
        return False
    if not isinstance(data[0], dict):
        return False
    keys = list(data[0].keys())
    return all(isinstance(row, dict) and list(row.keys()) == keys for row in data)

def to_markdown_table(data):
    keys = list(data[0].keys())
    col_widths = [max(len(str(k)), max((len(str(row.get(k, ""))) for row in data), default=0)) for k in keys]
    def fmt_row(cells):
        return "| " + " | ".join(str(c).ljust(w) for c, w in zip(cells, col_widths)) + " |"
    header    = fmt_row(keys)
    separator = "| " + " | ".join("-" * w for w in col_widths) + " |"
    rows      = [fmt_row([row.get(k, "") for k in keys]) for row in data]
    return "\n".join([header, separator] + rows)

# ── Handler ───────────────────────────────────────────────────────────────────

async def on_read():
    raw       = document.getElementById("input").value.strip()
    output_el = document.getElementById("output")
    status_el = document.getElementById("status")

    if not raw:
        output_el.value = ""
        return

    wrap_width  = int(document.getElementById("wrap-slider").value)
    font_size   = int(document.getElementById("font-slider").value)
    target_lang = document.getElementById("lang-select").value or None

    try:
        data = json.loads(raw)
    except json.JSONDecodeError:
        data = raw

    status_el.textContent = "Translating..." if target_lang else "Formatting..."

    try:
        # Detect table format before translation (structure is the same after)
        table_possible = is_table_data(data)

        if target_lang:
            data = await translate_value(data, target_lang)

        formatted = format_value(data, wrap_width=wrap_width)
        output_text = formatted

        table_text = to_markdown_table(data) if table_possible else None

        js.window.setOutputs(output_text, table_text)
        status_el.textContent = ""
        # Save to history
        js.window.addToHistory(raw, output_text, wrap_width, font_size, target_lang or "")
    except Exception as e:
        output_el.value = f"Error: {e}"
        status_el.textContent = ""

# ── Ready — expose handler to JS debounce ────────────────────────────────────
import asyncio
def _js_trigger():
    asyncio.ensure_future(on_read())

js.window._pyReadReady = _js_trigger
  </script>
</body>
</html>
