<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON / Text Reader</title>
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0078d4;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px;
      width: 100%;
      max-width: 98vw;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }

    textarea {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "Courier New", monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #0078d4; }
    #output { background: #f8f8f8; color: #222; min-height: 200px; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-group label { margin: 0; white-space: nowrap; }

    input[type=range] { width: 160px; accent-color: #0078d4; cursor: pointer; }

    select {
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    #val-wrap, #val-font { font-size: 0.82rem; color: #555; min-width: 28px; text-align: center; }

    button {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #005fa3; }
    button:disabled { background: #90b8d4; cursor: default; }

    #status {
      font-size: 0.82rem;
      color: #888;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>JSON / Text Reader</h1>

  <div class="card">
    <div>
      <label for="input">Input (JSON or plain text)</label>
      <textarea id="input" rows="14" placeholder="Paste your JSON or plain text here..."></textarea>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <label for="wrap-slider">Wrap width:</label>
        <input type="range" id="wrap-slider" min="20" max="200" step="10" value="80" />
        <span id="val-wrap">80</span>
      </div>

      <div class="ctrl-group">
        <label for="font-slider">Font size:</label>
        <input type="range" id="font-slider" min="8" max="32" step="1" value="13" />
        <span id="val-font">13</span>
      </div>

      <div class="ctrl-group">
        <label for="lang-select">Translate to:</label>
        <select id="lang-select">
          <option value="">No translation</option>
          <option value="en">English</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="th">Thai</option>
          <option value="vi">Vietnamese</option>
          <option value="tl">Tagalog</option>
        </select>
      </div>

      <button id="read-btn" disabled>Loading Python...</button>
    </div>

    <span id="status"></span>

    <div>
      <label for="output">Output</label>
      <textarea id="output" rows="22" readonly></textarea>
    </div>
  </div>

  <!-- Sliders are pure DOM — no need for Python -->
  <script>
    document.getElementById('wrap-slider').addEventListener('input', function () {
      document.getElementById('val-wrap').textContent = this.value;
    });
    document.getElementById('font-slider').addEventListener('input', function () {
      document.getElementById('val-font').textContent = this.value;
      const sz = this.value + 'px';
      document.getElementById('input').style.fontSize = sz;
      document.getElementById('output').style.fontSize = sz;
    });
  </script>

  <!-- Python runs in the browser via Pyodide (PyScript) -->
  <script type="py">
import json
import re
import textwrap
import urllib.parse
import js
from pyscript import document, when

GT_LIMIT = 4800  # safe chunk size for Google Translate unofficial endpoint

# ── Translation ──────────────────────────────────────────────────────────────

async def _translate_chunk(chunk, target_lang):
    encoded = urllib.parse.quote(chunk)
    url = (
        "https://translate.googleapis.com/translate_a/single"
        f"?client=gtx&sl=auto&tl={target_lang}&dt=t&q={encoded}"
    )
    response = await js.fetch(url)
    text = await response.text()
    data = json.loads(text)
    return "".join(part[0] for part in data[0])

async def translate_text(text, target_lang):
    if not target_lang or not text.strip():
        return text
    try:
        if len(text) <= GT_LIMIT:
            return await _translate_chunk(text, target_lang)
        # Split on sentence boundaries, fall back to hard split
        sentences = re.findall(r'[^.!?\n]+[.!?\n]*', text) or [text]
        chunks, current = [], ''
        for s in sentences:
            if len(current) + len(s) > GT_LIMIT:
                if current:
                    chunks.append(current)
                if len(s) > GT_LIMIT:
                    for i in range(0, len(s), GT_LIMIT):
                        chunks.append(s[i:i + GT_LIMIT])
                    current = ''
                else:
                    current = s
            else:
                current += s
        if current:
            chunks.append(current)
        parts = []
        for c in chunks:
            parts.append(await _translate_chunk(c, target_lang))
        return ''.join(parts)
    except Exception:
        return text

async def translate_value(value, target_lang):
    if isinstance(value, str):
        return await translate_text(value, target_lang)
    if isinstance(value, list):
        return [await translate_value(item, target_lang) for item in value]
    if isinstance(value, dict):
        return {k: await translate_value(v, target_lang) for k, v in value.items()}
    return value

# ── Formatting ────────────────────────────────────────────────────────────────

def format_value(value, indent=0, wrap_width=80):
    pad = "  " * indent
    if isinstance(value, dict):
        lines = []
        for k, v in value.items():
            if isinstance(v, (dict, list)):
                lines.append(f"{pad}{k}:")
                lines.append(format_value(v, indent + 1, wrap_width))
            else:
                lines.append(f"{pad}{k}: {format_value(v, indent, wrap_width)}")
        return "\n".join(lines)
    if isinstance(value, list):
        lines = []
        for item in value:
            if isinstance(item, (dict, list)):
                lines.append(format_value(item, indent, wrap_width))
                lines.append("")
            else:
                lines.append(f"{pad}- {format_value(item, indent, wrap_width)}")
        return "\n".join(lines).rstrip()
    if isinstance(value, str):
        text = value.replace("\\n", "\n").replace("\\t", "\t").replace("\\r", "")
        if wrap_width > 0:
            wrapped = []
            for line in text.splitlines():
                wrapped.extend(
                    textwrap.wrap(line, width=wrap_width, subsequent_indent=pad + "  ") or [""]
                )
            return "\n".join(wrapped)
        return text
    return str(value)

# ── Button handler ────────────────────────────────────────────────────────────

@when("click", "#read-btn")
async def on_read(event):
    raw        = document.getElementById("input").value.strip()
    output_el  = document.getElementById("output")
    status_el  = document.getElementById("status")
    read_btn   = document.getElementById("read-btn")

    if not raw:
        output_el.value = "Please paste a JSON string or plain text first."
        return

    wrap_width  = int(document.getElementById("wrap-slider").value)
    target_lang = document.getElementById("lang-select").value or None

    try:
        data = json.loads(raw)
    except json.JSONDecodeError:
        data = raw  # treat as plain string

    read_btn.disabled = True
    status_el.textContent = "Translating..." if target_lang else "Formatting..."

    try:
        if target_lang:
            data = await translate_value(data, target_lang)
        formatted = format_value(data, wrap_width=wrap_width)
        sep_start = "=" * 40 + " START " + "=" * 40
        sep_end   = "=" * 41 + " END "   + "=" * 41
        output_el.value = f"{sep_start}\n{formatted}\n{sep_end}"
        status_el.textContent = ""
    except Exception as e:
        output_el.value = f"Error: {e}"
        status_el.textContent = ""
    finally:
        read_btn.disabled = False

# ── Ready ─────────────────────────────────────────────────────────────────────
read_btn = document.getElementById("read-btn")
read_btn.textContent = "Read JSON"
read_btn.disabled = False
  </script>
</body>
</html>
